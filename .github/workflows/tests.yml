name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    env: 
      FAKE_API: "https://fakeapi.com"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run:  |
          pip install -r requirements.txt

      - name: Run API Tests
        run:  |
          pytest tests/api --alluredir=allure-results

      - name: Upload API report
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-results
          path: allure-results

  ui-tests:
    runs-on: ubuntu-latest
    env:
      BASE_URL_UI: https://www.demoblaze.com/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run:  |
          pip install -r requirements.txt

      - name: Run UI Tests
        run:  |
          pytest tests/ui --alluredir=allure-results

      - name: Upload UI report
        uses: actions/upload-artifact@v4
        with:
          name: ui-allure-results
          path: allure-results

  db-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run:  |
          pip install -r requirements.txt

      - name: Run DB mock Tests
        run:  |
          pytest tests/db --alluredir=allure-results

      - name: Upload DB mock report
        uses: actions/upload-artifact@v4
        with:
          name: db-allure-results
          path: allure-results

  app-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run:  |
          pip install -r requirements.txt

      - name: Run App Tests
        run:  |
          pytest tests/app --alluredir=allure-results

      - name: Upload APP report
        uses: actions/upload-artifact@v4
        with:
          name: app-allure-results
          path: allure-results